name: Deploy fixed website

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure fixed API URL
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: >
          node -e "const fs=require('fs');
          const api=(process.env.BACKEND_URL||'').replace(/\/+$/,'');
          fs.writeFileSync('frontend/config.js',
          'window.VOLLEYBALL_COACH_CONFIG = { apiBase: '+JSON.stringify(api)+' };\\n');"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload frontend
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
